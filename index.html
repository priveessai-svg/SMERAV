function fmtGrouped(n){
  n = Number(n||0);
  const neg = n<0; n = Math.abs(n);
  const fixed = n.toFixed(2);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');
  return (neg?'-':'') + parts[0] + ',' + parts[1];
}
function fmt(n){ return fmtGrouped(n)+' MAD'; }
function fmtN(n){ return fmtGrouped(n); }
function fmtQte(n){ return fmtGrouped(n); }
function fmtDate(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d; }
function today(){ return new Date().toISOString().split('T')[0]; }
function numToWords(n){
  // Convert number to French words for invoice
  const units=['','UN','DEUX','TROIS','QUATRE','CINQ','SIX','SEPT','HUIT','NEUF','DIX','ONZE','DOUZE','TREIZE','QUATORZE','QUINZE','SEIZE','DIX-SEPT','DIX-HUIT','DIX-NEUF'];
  const tens=['','','VINGT','TRENTE','QUARANTE','CINQUANTE','SOIXANTE','SOIXANTE','QUATRE-VINGT','QUATRE-VINGT'];
  function below100(n){
    if(n<20) return units[n];
    const t=Math.floor(n/10), u=n%10;
    if(t===7) return tens[6]+(u===0?'-DIX':u===1?'-ET-ONZE':'-'+units[10+u]);
    if(t===9) return tens[8]+(u===0?'S':'-'+units[10+u]);
    return tens[t]+(u===0?'':(u===1&&t!==8?'-ET-UN':'-'+units[u]));
  }
  function below1000(n){
    if(n===0) return '';
    if(n<100) return below100(n);
    const h=Math.floor(n/100),r=n%100;
    return (h===1?'CENT':(units[h]+' CENT'+(r===0&&h>1?'S':'')))+(r>0?' '+below100(r):'');
  }
  n = Math.round(n*100)/100;
  const intPart = Math.floor(n);
  const centPart = Math.round((n-intPart)*100);
  let result='';
  if(intPart>=1000000){ const m=Math.floor(intPart/1000000); result+=(m===1?'UN MILLION':below1000(m)+' MILLIONS')+' '; }
  const thousands=Math.floor((intPart%1000000)/1000);
  if(thousands>0){ result+=(thousands===1?'MILLE':below1000(thousands)+' MILLE')+' '; }
  const remainder=intPart%1000;
  if(remainder>0) result+=below1000(remainder);
  result=result.trim()||'ZÉRO';
  result+=' DIRHAMS';
  if(centPart>0) result+=' ET '+below100(centPart)+' CENTIMES';
  return result+' T.T.C.';
}

function el(tag, attrs, ...children){
  const e = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k==='className') e.className=v;
    else if(k==='innerHTML') e.innerHTML=v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return e;
}

function div(attrs, ...children){ return el('div', attrs, ...children); }
function span(attrs, ...children){ return el('span', attrs, ...children); }
function btn(text, cls, onclick, extra={}){ return el('button',{className:'btn '+cls,onclick,...extra},text); }

}

function buildSignatureHTML(p, defaultNom){
  let sigs = (p.signataires && p.signataires.length) ? p.signataires : [
    {titre:'Maître d\'ouvrage',nom:p.maitreOuvrage||'SRM-FM',row:0},
    {titre:'Titulaire du Marché',nom:defaultNom||'SMERAV S.A.R.L.au',row:0}
  ];
  sigs = sigs.map(s=>({...s,row:s.row||0}));
  const maxRow = sigs.reduce((m,s)=>Math.max(m,s.row),0);
  let out = '';
  for(let r=0;r<=maxRow;r++){
    const rowSigs = sigs.filter(s=>s.row===r);
    if(!rowSigs.length) continue;
    out += '<table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-top:'+(r===0?14:8)+'px;">'
      + '<tr>'+rowSigs.map(sig=>'<td style="border:1px solid #333;padding:4px 8px;font-size:10px;text-align:center;background:#f0f0f0;width:'+(sig.width||Math.round(100/rowSigs.length))+'%;"><div style="font-size:9px;color:#666;margin-bottom:2px;">'+(sig.titre||'')+'</div><div style="font-weight:700;font-size:12px;">'+sig.nom+'</div></td>').join('')+'</tr>'
      + '<tr>'+rowSigs.map(sig=>'<td style="border:1px solid #333;padding:0;height:'+(sig.height||p.sigHeight||35)+'mm;vertical-align:bottom;text-align:center;width:'+(sig.width||Math.round(100/rowSigs.length))+'%;"><div style="border-top:1px solid #999;margin:0 15mm;padding-top:2mm;font-size:9px;color:#666;">Signature et cachet</div></td>').join('')+'</tr>'
      + '</table>';
  }
  return out;
}

function renderDashboard(){
  const totalBudget = state.projects.reduce((s,p)=>s+p.budget,0);
  const totalClients = state.clients.length;
  const totalFactures = state.factures.reduce((s,f)=>s+(f.montantTTC||0),0);
  const totalPaye = state.factures.filter(f=>f.statut==='Payée').reduce((s,f)=>s+(f.montantTTC||0),0);

  return div({},
    div({style:{fontSize:22,fontWeight:900,marginBottom:20}},'Tableau de Bord'),
    div({className:'grid-3',style:{marginBottom:20}},
      ...([
        ['🏗 Projets actifs', state.projects.filter(p=>p.statut==='En cours').length, C.blue],
        ['💰 Budget portfolio', fmt(totalBudget), C.orange],
        ['👥 Clients', totalClients, C.green],
        ['📄 Factures émises', fmt(totalFactures), C.blue],
        ['✅ Total encaissé', fmt(totalPaye), C.green],
        ['⏳ En attente', fmt(totalFactures-totalPaye), C.yellow],
      ].map(([k,v,col])=>
        div({className:'stat-card card',style:{background:col+'15',border:`1.5px solid ${col}30`}},
          div({style:{fontSize:11,color:col,fontWeight:700,marginBottom:6}},k),
          div({style:{fontSize:20,fontWeight:900}},v)
        )
      ))
    ),
    div({style:{fontSize:16,fontWeight:800,marginBottom:12}},'Projets récents'),
    div({className:'card'},
      div({style:{overflowX:'auto'}},
        el('table',{},
          el('thead',{},el('tr',{},
            ...['Réf','Nom','Client','Budget','Statut','Progression'].map(h=>el('th',{},h))
          )),
          el('tbody',{},...state.projects.slice(0,5).map(p=>
            el('tr',{style:{cursor:'pointer'},onclick:()=>setState({page:'fiche-projet',selProject:p.id,ficheSection:'info'})},
              el('td',{style:{fontWeight:700,color:C.blue}},p.ref),
              el('td',{style:{fontWeight:600}},p.nom),
              el('td',{},p.client),
              el('td',{style:{fontWeight:700,color:C.orange}},fmt(p.budget)),
              el('td',{},span({className:'badge',style:{background:p.statut==='En cours'?C.blue+'20':'#F0FFF4',color:p.statut==='En cours'?C.blue:C.green}},p.statut)),
              el('td',{},
                div({style:{background:'#eee',borderRadius:20,height:6,width:100}},
                  div({style:{background:C.orange,height:'100%',borderRadius:20,width:(p.progression||0)+'%'}})
                )
              )
            )
          ))
        )
      )
    )
  );
}

// ── CLIENTS ──────────────────────────────
function renderClients(){
  const clients = state.clients;
  return div({},
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
      div({style:{fontSize:18,fontWeight:800}},'Clients'),
      btn('+ Nouveau Client','btn-orange',()=>{
        showClientForm();
      })
    ),
    div({className:'card'},
      el('table',{},
        el('thead',{},el('tr',{},
          ...['Nom','ICE','Adresse','Téléphone','Email',''].map(h=>el('th',{},h))
        )),
        el('tbody',{},...(clients.length?clients.map((c,i)=>
          el('tr',{},
            el('td',{style:{fontWeight:700}},c.nom),
            el('td',{},c.ice ? span({style:{color:C.muted}},c.ice) : span({style:{color:'#F59E0B',fontWeight:700,fontSize:11}},'⚠️ ICE manquant')),
            el('td',{},c.adresse||'—'),
            el('td',{},c.tel||'—'),
            el('td',{},c.email||'—'),
            el('td',{},
              btn('✕','btn-red',()=>{
                if(confirmDelete()){
                  setState({clients:state.clients.filter((_,idx)=>idx!==i)});
                }
              },{style:{padding:'4px 10px',fontSize:12}})
            )
          )
        ):[el('tr',{},el('td',{colSpan:6,style:{padding:40,textAlign:'center',color:C.muted}},'Aucun client'))]))
      )
    )
  );
}

function showClientForm(client=null, idx=null){
  let f = client ? {...client} : {nom:'',ice:'',adresse:'',tel:'',email:'',ville:'',rc:'',if_:''};
  const formEl = div({style:{display:'flex',flexDirection:'column',gap:12}},
    div({className:'grid-2'},
      labeledInput('Nom *', Object.assign(el('input',{value:f.nom||''}),{oninput:e=>f.nom=e.target.value})),
      labeledInput('ICE (important pour la future facturation électronique)', Object.assign(el('input',{value:f.ice||''}),{oninput:e=>f.ice=e.target.value})),
      labeledInput('Téléphone', Object.assign(el('input',{value:f.tel||''}),{oninput:e=>f.tel=e.target.value})),
      labeledInput('Email', Object.assign(el('input',{value:f.email||''}),{oninput:e=>f.email=e.target.value})),
      labeledInput('RC', Object.assign(el('input',{value:f.rc||''}),{oninput:e=>f.rc=e.target.value})),
      labeledInput('IF', Object.assign(el('input',{value:f.if_||''}),{oninput:e=>f.if_=e.target.value})),
    ),
    div({style:{gridColumn:'1/-1'}},
      labeledInput('Adresse', Object.assign(el('input',{value:f.adresse||''}),{oninput:e=>f.adresse=e.target.value}))
    ),
    div({style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}},
      btn('Annuler','btn-gray',()=>setState({modal:null})),
      btn('Enregistrer','btn-orange',()=>{
        if(!f.nom){ alert('Nom obligatoire'); return; }
        const clients = [...state.clients];
        if(idx!==null) clients[idx]={...clients[idx],...f};
        else clients.push({id:Date.now(),...f});
        setState({clients,modal:null});
        notify(f.ice ? 'Client enregistré ✓' : 'Client enregistré — pensez à ajouter l\'ICE plus tard ⚠️');
      })
    )
  );
  setState({modal:{title: client?'Modifier Client':'Nouveau Client', content:formEl}});
}

// ── FACTURES ─────────────────────────────
function renderFactures(){
  const factures = state.factures;
  const total = factures.reduce((s,f)=>s+(f.montantTTC||0),0);
  const paye = factures.filter(f=>f.statut==='Payée').reduce((s,f)=>s+(f.montantTTC||0),0);

  return div({},
    div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:20}},
      ...([
        ['Total TTC', fmt(total), C.blue],
        ['Encaissé', fmt(paye), C.green],
        ['En attente', fmt(total-paye), C.orange],
      ].map(([k,v,col])=>
        div({className:'stat-card card',style:{background:col+'15',border:`1.5px solid ${col}30`}},
          div({style:{fontSize:11,color:col,fontWeight:700,marginBottom:4}},k),
          div({style:{fontSize:18,fontWeight:900}},v)

function showFactureForm(facture=null, idx=null){
  const nextNum = 'FAC-'+new Date().getFullYear()+String(state.factures.length+1).padStart(4,'0');
  let f = facture ? {...facture} : {
    num:nextNum, date:today(), client:'', clientIce:'', clientAdresse:'',
    reglement:'Virement', numReglement:'', tva:20, statut:'Non payée', lignes:[]
  };
  if(!f.lignes) f.lignes=[];

  const lignesContainer = div({style:{marginTop:12}});
  const totalDiv = div({style:{textAlign:'right',marginTop:8,padding:'8px 0',borderTop:'1px solid #eee'}});

  function calcTotal(){
    const ht = f.lignes.reduce((s,l)=>s+(l.qte||0)*(l.pu||0),0);
    const tva_val = ht*(f.tva||20)/100;
    const ttc = ht+tva_val;
    f.montantHT=ht; f.montantTVA=tva_val; f.montantTTC=ttc;
    totalDiv.innerHTML=`
      <div style="font-size:12px;color:${C.muted}">Montant HT: <strong>${fmtN(ht)}</strong></div>
      <div style="font-size:12px;color:${C.muted}">TVA ${f.tva}%: <strong>${fmtN(tva_val)}</strong></div>
      <div style="font-size:16px;font-weight:900;color:${C.orange}">Net à Payer: ${fmt(ttc)}</div>
    `;
    renderLignes();
  }

  function renderLignes(){
    lignesContainer.innerHTML='';
    lignesContainer.appendChild(el('table',{},
      el('thead',{},el('tr',{},
        ...['Référence','Désignation','Qté','Unité','P.U. HT','Montant HT','Montant TTC',''].map(h=>
          el('th',{style:{fontSize:10,padding:'6px 8px'}},h)
        )
      )),
      el('tbody',{},...f.lignes.map((l,i)=>
        el('tr',{},
          el('td',{style:{padding:'4px'}},Object.assign(el('input',{value:l.ref||'',style:{width:60}}),{oninput:e=>{f.lignes[i].ref=e.target.value;}})),
          el('td',{style:{padding:'4px'}},Object.assign(el('input',{value:l.designation||'',style:{width:200}}),{oninput:e=>{f.lignes[i].designation=e.target.value;}})),
          el('td',{style:{padding:'4px'}},Object.assign(el('input',{type:'number',value:l.qte||0,style:{width:60}}),{oninput:e=>{f.lignes[i].qte=+e.target.value;calcTotal();}})),
          el('td',{style:{padding:'4px'}},Object.assign(el('input',{value:l.unite||'',style:{width:50}}),{oninput:e=>{f.lignes[i].unite=e.target.value;}})),
          el('td',{style:{padding:'4px'}},Object.assign(el('input',{type:'number',value:l.pu||0,style:{width:80}}),{oninput:e=>{f.lignes[i].pu=+e.target.value;calcTotal();}})),
          el('td',{style:{padding:'6px 8px',fontWeight:700}},fmtN((l.qte||0)*(l.pu||0))),
          el('td',{style:{padding:'6px 8px',color:C.orange}},fmtN((l.qte||0)*(l.pu||0)*(1+(f.tva||20)/100))),
          el('td',{},el('button',{style:{background:'#FEE2E2',color:C.red,border:'none',borderRadius:4,padding:'3px 8px',cursor:'pointer'},onclick:()=>{f.lignes.splice(i,1);calcTotal();}}, '✕'))
        )
      ))
    ));
  }
  calcTotal();

  const formEl = div({style:{display:'flex',flexDirection:'column',gap:12}},
    div({className:'grid-2'},
      div({},
        el('label',{className:'lbl'},'Facture N°'),
        Object.assign(el('input',{value:f.num}),{oninput:e=>f.num=e.target.value})
      ),
      div({},
        el('label',{className:'lbl'},'Date'),
        Object.assign(el('input',{type:'date',value:f.date}),{oninput:e=>f.date=e.target.value})
      ),
      div({},
        el('label',{className:'lbl'},'Client'),
        Object.assign((()=>{
          const sel = el('select',{});
          sel.innerHTML='<option value="">-- Choisir --</option>';
          state.clients.forEach(c=>sel.innerHTML+=`<option value="${c.nom}" ${f.client===c.nom?'selected':''}>${c.nom}</option>`);
          sel.oninput=e=>{
            f.client=e.target.value;
            const c=state.clients.find(c=>c.nom===e.target.value);
            if(c){ f.clientIce=c.ice||''; f.clientAdresse=c.adresse||''; }
          };
          return sel;
        })(),{})
      ),
      div({},
        el('label',{className:'lbl'},'Mode règlement'),
        Object.assign((()=>{
          const sel=el('select',{});
          ['Virement','Chèque','Espèces'].forEach(m=>sel.innerHTML+=`<option ${f.reglement===m?'selected':''}>${m}</option>`);
          sel.oninput=e=>f.reglement=e.target.value;
          return sel;
        })(),{})
      ),
      div({},
        el('label',{className:'lbl'},'N° Règlement'),
        Object.assign(el('input',{value:f.numReglement||''}),{oninput:e=>f.numReglement=e.target.value})
      ),
      div({},
        el('label',{className:'lbl'},'Taux TVA (%)'),
        Object.assign(el('input',{type:'number',value:f.tva}),{oninput:e=>{f.tva=+e.target.value;calcTotal();}})
      ),
    ),
    div({style:{borderTop:'1px solid #eee',paddingTop:12}},
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}},
        div({style:{fontWeight:800,fontSize:13}},'Détail de la facture'),
        div({style:{display:'flex',gap:8,flexWrap:'wrap'}},
          btn('🏗 Depuis un Marché','btn-blue',()=>openLignePicker(
            (ligne)=>{f.lignes.push(ligne);calcTotal();},
            ()=>setState({modal:{title:facture?'Modifier Facture':'Nouvelle Facture',content:formEl,wide:true}})
          ),{style:{padding:'6px 12px',fontSize:12}}),
          btn('📦 Produits/Services','btn-blue',()=>openLignePicker(
            (ligne)=>{f.lignes.push(ligne);calcTotal();},
            ()=>setState({modal:{title:facture?'Modifier Facture':'Nouvelle Facture',content:formEl,wide:true}})
          ),{style:{padding:'6px 12px',fontSize:12}}),
          btn('📋 Depuis un Décompte','btn-blue',()=>openDecomptePicker(
            (newLignes)=>{f.lignes.push(...newLignes);calcTotal();},
            ()=>setState({modal:{title:facture?'Modifier Facture':'Nouvelle Facture',content:formEl,wide:true}}),
            (client)=>{ if(!f.client) f.client=client; }
          ),{style:{padding:'6px 12px',fontSize:12}}),
          btn('+ Ligne manuelle','btn-orange',()=>{f.lignes.push({ref:'',designation:'',qte:1,unite:'U',pu:0});calcTotal();},{style:{padding:'6px 14px',fontSize:12}})
        )
      ),
      lignesContainer
    ),
    totalDiv,
    div({style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}},
      btn('Annuler','btn-gray',()=>setState({modal:null})),
      btn('Enregistrer','btn-orange',()=>{
        if(!f.client){ alert('Sélectionnez un client'); return; }
        calcTotal();
        const factures=[...state.factures];
        if(idx!==null) factures[idx]={...factures[idx],...f};
        else factures.push({id:Date.now(),...f});
        setState({factures,modal:null});
        notify('Facture enregistrée ✓');
      })
    )
  );
  setState({modal:{title:facture?'Modifier Facture':'Nouvelle Facture',content:formEl,wide:true}});
}

const AUTH = {
  user: 'smerav',
  pass: localStorage.getItem('smerav_pwd') || 'Ksiksou1992',
  email: localStorage.getItem('smerav_email') || '',
  secQuestion: localStorage.getItem('smerav_secq') || '',
  secAnswer: localStorage.getItem('smerav_seca') || '',
  isLoggedIn: () => sessionStorage.getItem('smerav_auth') === 'ok',
  login: (u, p) => {
    const uOk = (u === AUTH.user) || (AUTH.email && u.trim().toLowerCase() === AUTH.email.trim().toLowerCase());
    if(uOk && p === AUTH.pass){
      sessionStorage.setItem('smerav_auth','ok');
      return true;
    }
    return false;
  },
  logout: () => { sessionStorage.removeItem('smerav_auth'); render(); }
};

function renderLogin(){
  const app = document.getElementById('app');
  app.innerHTML='';
  let errMsg = null;

  const draw = () => {
    app.innerHTML='';
    const userInput = el('input',{type:'text',placeholder:'Nom d\'utilisateur ou email',style:{marginBottom:12,padding:'12px 16px',fontSize:15,borderRadius:10,border:'2px solid #1E2D4A',background:'#1A2540',color:'#fff',outline:'none',width:'100%'}});
    const passInput = el('input',{type:'password',placeholder:'Mot de passe',style:{marginBottom:16,padding:'12px 16px',fontSize:15,borderRadius:10,border:'2px solid #1E2D4A',background:'#1A2540',color:'#fff',outline:'none',width:'100%'}});

    const doLogin = () => {
      if(AUTH.login(userInput.value.trim(), passInput.value.trim())){
        render();
      } else {
        errMsg = '❌ Nom d\'utilisateur ou mot de passe incorrect';
        draw();
      }
    };

    passInput.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

    const forgotLink = div({style:{textAlign:'center',marginTop:12,fontSize:12,color:'#6B7A99',cursor:'pointer',textDecoration:'underline'}, onclick:()=>drawRecovery()}, 'Mot de passe oublié ?');

    app.appendChild(
      div({style:{minHeight:'100vh',background:'#0F1628',display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
        div({style:{background:'#162030',borderRadius:20,padding:'40px 36px',width:'100%',maxWidth:380,border:'1px solid #1E2D4A',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}},
          div({style:{textAlign:'center',marginBottom:28}},
            div({style:{fontSize:22,fontWeight:800,color:'#E8730A',letterSpacing:1}}, 'SMERAV'),
            div({style:{fontSize:12,color:'#6B7A99',marginTop:2}}, 'Gestion des Projets et Administration')
          ),
          userInput,
          passInput,
          errMsg ? div({style:{color:'#EF4444',fontSize:12,marginBottom:12,textAlign:'center'}}, errMsg) : null,
          el('button',{
            style:{width:'100%',padding:'13px',background:'#E8730A',color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:15,cursor:'pointer'},
            onclick: doLogin
          }, '🔐 Se connecter'),
          forgotLink
        )
      )
    );
  };

  const drawRecovery = () => {
    app.innerHTML='';
    let recMsg = null;
    let step = AUTH.secQuestion ? 'answer' : 'none'; // 'none' = no security question configured
    const answerInput = el('input',{type:'text',placeholder:'Votre réponse',style:{marginBottom:12,padding:'12px 16px',fontSize:15,borderRadius:10,border:'2px solid #1E2D4A',background:'#1A2540',color:'#fff',outline:'none',width:'100%'}});
    const newPassInput = el('input',{type:'password',placeholder:'Nouveau mot de passe',style:{marginBottom:12,padding:'12px 16px',fontSize:15,borderRadius:10,border:'2px solid #1E2D4A',background:'#1A2540',color:'#fff',outline:'none',width:'100%',display:'none'}});
    let verified = false;

    const checkAnswer = () => {
      if(answerInput.value.trim().toLowerCase() === (AUTH.secAnswer||'').trim().toLowerCase() && AUTH.secAnswer){
        verified = true;
        newPassInput.style.display='block';
        recMsg = '✅ Réponse correcte — entrez votre nouveau mot de passe';
      } else {
        recMsg = '❌ Réponse incorrecte';
      }
      drawRecoveryBody();
    };

    function drawRecoveryBody(){
      body.innerHTML='';
      body.appendChild(div({style:{textAlign:'center',marginBottom:24}},
        div({style:{fontSize:22,fontWeight:800,color:'#E8730A',letterSpacing:1}}, 'SMERAV'),
        div({style:{fontSize:12,color:'#6B7A99',marginTop:2}}, 'Récupération du mot de passe')
      ));
      if(step==='none'){
        body.appendChild(div({style:{color:'#6B7A99',fontSize:13,marginBottom:16,textAlign:'center'}},
          "Aucune question de sécurité n'a été configurée. Rendez-vous dans Mon Profil > Sécurité (une fois connecté) pour en configurer une, afin de pouvoir récupérer votre mot de passe la prochaine fois."
        ));
      } else {
        body.appendChild(div({style:{color:'#fff',fontSize:13,marginBottom:14,fontWeight:600}}, AUTH.secQuestion));
        body.appendChild(answerInput);
        if(!verified){
          body.appendChild(el('button',{style:{width:'100%',padding:'12px',background:'#2563EB',color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',marginBottom:10},onclick:checkAnswer},'Vérifier'));
        } else {
          body.appendChild(newPassInput);
          body.appendChild(el('button',{style:{width:'100%',padding:'12px',background:'#10B981',color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',marginBottom:10},onclick:()=>{
            if(!newPassInput.value){recMsg='Entrez un nouveau mot de passe';drawRecoveryBody();return;}
            AUTH.pass = newPassInput.value;
            localStorage.setItem('smerav_pwd', newPassInput.value);
            recMsg = '✅ Mot de passe réinitialisé — vous pouvez vous connecter';
            draw();
          }},'Réinitialiser le mot de passe'));
        }
      }
      if(recMsg) body.appendChild(div({style:{color:verified?'#10B981':'#EF4444',fontSize:12,marginBottom:10,textAlign:'center'}}, recMsg));
      body.appendChild(div({style:{textAlign:'center',marginTop:8,fontSize:12,color:'#6B7A99',cursor:'pointer',textDecoration:'underline'},onclick:()=>draw()}, '← Retour à la connexion'));
    }

    const body = div({});
    app.appendChild(
      div({style:{minHeight:'100vh',background:'#0F1628',display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
        div({style:{background:'#162030',borderRadius:20,padding:'40px 36px',width:'100%',maxWidth:380,border:'1px solid #1E2D4A',boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}},
          body
        )
      )
    );
    drawRecoveryBody();
  };
  draw();
}

function renderProjetDocuments(p, updateProject){
  const docs = p.documents||[];

  function buildPdfFromImage(imgData, onReady){
    const img = new Image();
    img.onload = ()=>{
      const { jsPDF } = window.jspdf;
      const pageW=210, pageH=297; // A4 en mm
      const ratio = Math.min((pageW-20)/img.width, (pageH-20)/img.height);
      const w = img.width*ratio, h = img.height*ratio;
      const x = (pageW-w)/2, y = (pageH-h)/2;
      const docPdf = new jsPDF({unit:'mm',format:'a4'});
      docPdf.addImage(imgData, 'JPEG', x, y, w, h);
      onReady(docPdf.output('datauristring'));
    };
    img.src = imgData;
  }

  function handleFile(file){
    const isPdf = file.type==='application/pdf';
    const reader = new FileReader();
    reader.onload = (e)=>{
      const fileData = e.target.result;
      let nomVal = '';
      const nameInput = el('input',{type:'text',placeholder:"ex: Facture fournisseur"});
      nameInput.oninput = ev=>nomVal=ev.target.value;
      const fEl = div({style:{display:'flex',flexDirection:'column',gap:12}},
        div({},el('label',{className:'lbl'},'Nom du document'),nameInput),
        div({style:{display:'flex',gap:10,justifyContent:'flex-end'}},
          btn('Annuler','btn-gray',()=>setState({modal:null})),
          btn('Enregistrer','btn-orange',()=>{
            if(!nomVal.trim()){alert('Nom obligatoire');return;}
            if(isPdf){
              const newDoc = {id:Date.now(), nom:nomVal.trim(), dataUrl:fileData, date:today()};
              updateProject({documents:[...docs,newDoc]});
              setState({modal:null});
              notify('Document enregistré ✓');
            } else {
              buildPdfFromImage(fileData,(dataUrl)=>{
                const newDoc = {id:Date.now(), nom:nomVal.trim(), dataUrl, date:today()};
                updateProject({documents:[...docs,newDoc]});
                setState({modal:null});
                notify('Document enregistré ✓');
              });
            }
          })
        )
      );
      setState({modal:{title:'Nom du document',content:fEl}});
    };
    reader.readAsDataURL(file);
  }

  const fileInput = el('input',{type:'file',accept:'image/*,application/pdf',style:{display:'none'}});
  fileInput.onchange = e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); e.target.value=''; };

  function openDoc(d){
    const w = window.open('');
    if(w) w.document.write('<iframe src="'+d.dataUrl+'" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;"></iframe>');
  }
  function downloadDoc(d){
    const a = document.createElement('a');
    a.href = d.dataUrl; a.download = d.nom+'.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  return div({},
    fileInput,
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      div({},div({style:{fontSize:15,fontWeight:800}},'Documents'),div({style:{color:'#6B7A99',fontSize:12}},docs.length+' document(s)')),
      btn('📷 Scanner un document','btn-orange',()=>fileInput.click())
    ),
    div({className:'card'},
      docs.length ? div({},...docs.slice().reverse().map(d=>
        div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid #E5E9F2'}},
          div({style:{display:'flex',alignItems:'center',gap:10}},
            span({style:{fontSize:22}},'📄'),
            div({},
              div({style:{fontWeight:700}},d.nom),
              div({style:{fontSize:11,color:'#6B7A99'}},fmtDate(d.date))
            )
          ),
          div({style:{display:'flex',gap:6}},
            btn('👁 Ouvrir','btn-gray',()=>openDoc(d),{style:{padding:'4px 10px',fontSize:12}}),
            btn('⬇️','btn-gray',()=>downloadDoc(d),{style:{padding:'4px 8px',fontSize:12}}),
            btn('✕','btn-red',()=>{if(confirmDelete())updateProject({documents:docs.filter(x=>x.id!==d.id)});},{style:{padding:'4px 8px',fontSize:12}})
          )
        )
      )) : div({style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucun document — cliquez sur "📷 Scanner un document" pour ajouter votre premier fichier')
    )
  );
}


function getMontantAttache(p){
  const atts = p.attachements||[];
  if(!atts.length) return 0;
  const last = atts[atts.length-1];
  const lignes = last.lignes||[];
  const cumHT = lignes.reduce((s,l)=>s+(l.cumul||0)*(l.pu||0),0);
  const tva = cumHT*0.20;
  return cumHT+tva;
}
function getProgressionCalc(p){
  const budget = p.budget||0;
  if(!budget) return 0;
  const pct = (getMontantAttache(p)/budget)*100;
  return Math.max(0, Math.min(100, Math.round(pct*10)/10));
}

function renderListeProjets(){
  // Filters state
  if(!renderListeProjets._f) renderListeProjets._f = {search:'',client:'',statut:'',dateMin:'',dateMax:'',progMin:'',progMax:''};
  const flt = renderListeProjets._f;

  // Get unique clients
  const clients = [...new Set(state.projects.map(p=>p.client).filter(Boolean))];

  // Filter projects
  let projs = state.projects.filter(p=>{
    if(flt.search && !p.nom.toLowerCase().includes(flt.search.toLowerCase()) && !p.ref.toLowerCase().includes(flt.search.toLowerCase())) return false;
    if(flt.client && p.client !== flt.client) return false;
    if(flt.statut && p.statut !== flt.statut) return false;
    if(flt.dateMin && p.dateDebut < flt.dateMin) return false;
    if(flt.dateMax && p.dateDebut > flt.dateMax) return false;
    if(flt.progMin && getProgressionCalc(p) < Number(flt.progMin)) return false;
    if(flt.progMax && getProgressionCalc(p) > Number(flt.progMax)) return false;
    return true;
  });

  function inp(placeholder, key, type='text', val=''){
    const i = el('input',{type,placeholder,value:flt[key]||val,style:{padding:'8px 12px',fontSize:12,borderRadius:8,border:'1.5px solid #E5E9F2',background:'#F8FAFD',color:'#1A2540',outline:'none',width:'100%'}});
    i.oninput = e => { flt[key]=e.target.value; renderListeProjets._f=flt; render(); };
    return i;
  }
  function sel(key, opts, placeholder){
    const s = el('select',{style:{padding:'8px 12px',fontSize:12,borderRadius:8,border:'1.5px solid #E5E9F2',background:'#F8FAFD',color:'#1A2540',outline:'none',width:'100%'}});
    s.innerHTML = `<option value="">${placeholder}</option>` + opts.map(o=>`<option value="${o}" ${flt[key]===o?'selected':''}>${o}</option>`).join('');
    s.onchange = e => { flt[key]=e.target.value; renderListeProjets._f=flt; render(); };
    return s;
  }

  // Export Excel
  function exportExcel(){
    if(!window.XLSX){alert('XLSX non disponible');return;}
    const rows = [['Réf','Nom','Client','Maître ouvrage','Budget (MAD)','Montant attaché','Reste à recevoir','Date début','Date fin','Progression (%)','Statut']];
    projs.forEach(p=>{
      const paye = getMontantAttache(p);

    <p style="color:#6B7A99;font-size:12px;margin-bottom:16px">${projs.length} projet(s) · Exporté le ${new Date().toLocaleDateString('fr-MA')}</p>
    <table><thead><tr><th>Réf</th><th>Nom</th><th>Client</th><th>Budget</th><th>Montant payé</th><th>Reste à recevoir</th><th>Date début</th><th>Progression</th><th>Statut</th></tr></thead>
    <tbody>${rows}</tbody></table></body></html>`);
    win.document.close();

        div({style:{fontSize:20,fontWeight:800}},'Gestion des Projets'),

      div({style:{display:'flex',gap:8,flexWrap:'wrap'}},
        el('button',{onclick:exportPDF,style:{padding:'9px 16px',background:'#EF444415',color:'#EF4444',border:'1.5px solid #EF444430',borderRadius:9,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},'📄 Exporter PDF'),
        el('button',{onclick:exportExcel,style:{padding:'9px 16px',background:'#10B98115',color:'#10B981',border:'1.5px solid #10B98130',borderRadius:9,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},'📊 Exporter Excel'),
        btn('+ Ajouter un Projet','btn-orange',()=>setState({page:'nouveau-projet'}))

    ),

    // Filters
    div({className:'card',style:{padding:16,marginBottom:16}},
      div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginBottom:10}},
        div({style:{position:'relative'}},
          el('span',{style:{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#6B7A99',fontSize:14}},'🔍'),
          Object.assign(el('input',{type:'text',placeholder:'Rechercher un projet...',value:flt.search,style:{padding:'8px 12px 8px 32px',fontSize:12,borderRadius:8,border:'1.5px solid #E5E9F2',background:'#F8FAFD',color:'#1A2540',outline:'none',width:'100%'}}),{oninput:e=>{flt.search=e.target.value;renderListeProjets._f=flt;render();}})
        ),
        sel('client', clients, 'Tous les clients'),

        inp('Date début min','dateMin','date'),

        el('tbody',{},...(projs.length ? projs.map((p,i)=>{

function showDevisForm(){
  const nextNum='DEV-'+new Date().getFullYear()+String(state.devis.length+1).padStart(4,'0');

    lignesContainer.innerHTML='';

      el('thead',{},el('tr',{},...['Désignation','Qté','Unité','P.U. HT','Montant HT',''].map(h=>el('th',{style:{fontSize:10,padding:'5px 8px'}},h)))),

        el('td',{},el('button',{style:{background:'#FEE2E2',color:'#EF4444',border:'none',borderRadius:4,padding:'3px 8px',cursor:'pointer'},onclick:()=>{f.lignes.splice(i,1);calcTotal();}},'✕'))

      div({},el('label',{className:'lbl'},'Validité (jours)'),Object.assign(el('input',{type:'number',value:f.validite}),{oninput:e=>f.validite=+e.target.value})),
    ),

    div({style:{borderTop:'1px solid #eee',paddingTop:10}},

// ── BONS DE COMMANDE ─────────────────────
function nextBcNum(bcs){
  const year = new Date().getFullYear();
  const nums = bcs.map(b=>{
    const m = (b.num||'').match(/^BC-(\d+)\/(\d+)$/);
    return (m && +m[2]===year) ? +m[1] : 0;
  });
  const max = nums.length ? Math.max(...nums) : 0;
  return 'BC-'+String(max+1).padStart(4,'0')+'/'+year;
}

function renderFichesPaie(){
  if(!renderFichesPaie._tab) renderFichesPaie._tab='pointage';
  if(!renderFichesPaie._mois) renderFichesPaie._mois = today().slice(0,7);
  const tab = renderFichesPaie._tab;
  const mois = renderFichesPaie._mois;
  const ouvriers = state.ouvriers||[];

  function daysInMonth(m){ const [y,mm]=m.split('-').map(Number); return new Date(y,mm,0).getDate(); }
  const nDays = daysInMonth(mois);
  const dayNums = Array.from({length:nDays},(_,i)=>i+1);

  function getRec(o){
    const paie = o.paie||{};
    return paie[mois] || {jours:{}, avance:0, statut:'En attente', datePaiement:''};
  }
  function ttj(o){ const j=getRec(o).jours||{}; return Object.values(j).reduce((s,v)=>s+(+v||0),0); }
  function saveRec(oId, patch){
    const updated = ouvriers.map(o=>{
      if(o.id!==oId) return o;
      const paie = {...(o.paie||{})};
      paie[mois] = {...getRec(o), ...patch};
      return {...o, paie};
    });
    setState({ouvriers:updated});
  }

  const tabsBar = div({style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
    btn('🕐 Pointage','btn-'+(tab==='pointage'?'orange':'gray'),()=>{renderFichesPaie._tab='pointage';render();}),
    btn('💵 Tableau de paiement','btn-'+(tab==='tableau'?'orange':'gray'),()=>{renderFichesPaie._tab='tableau';render();}),
    btn('📄 Fiche de paie','btn-'+(tab==='fiche'?'orange':'gray'),()=>{renderFichesPaie._tab='fiche';render();}),
  );
  const moisInput = Object.assign(el('input',{type:'month',value:mois}),{oninput:e=>{renderFichesPaie._mois=e.target.value;render();}});

  // ---- Onglet Pointage : grille calendrier (1 case par jour) ----
  if(tab==='pointage'){
    return div({},
      div({style:{fontSize:18,fontWeight:800,marginBottom:14}},'Fiches de paie'),
      tabsBar,
      div({style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},el('label',{className:'lbl'},'Mois'),moisInput),
      div({className:'card',style:{overflowX:'auto'}},
        el('table',{style:{fontSize:11}},
          el('thead',{},el('tr',{},
            el('th',{style:{minWidth:30}},'N°'),
            el('th',{style:{minWidth:140,textAlign:'left'}},'Nom & Prénom'),
            el('th',{style:{minWidth:60}},'Fonction'),
            ...dayNums.map(d=>el('th',{style:{padding:'4px 2px',minWidth:22}},String(d))),
            el('th',{style:{minWidth:45,background:'#E8730A',color:'#fff'}},'TTJ')
          )),
          el('tbody',{},...(ouvriers.length?ouvriers.map((o,i)=>{
            const rec = getRec(o);
            return el('tr',{},
              el('td',{style:{textAlign:'center',color:'#6B7A99'}},i+1),
              el('td',{style:{fontWeight:700,whiteSpace:'nowrap'}},o.nom+' '+(o.prenom||'')),
              el('td',{style:{textAlign:'center'}},o.specialite||'—'),
              ...dayNums.map(d=>{
                const val = (rec.jours||{})[d]?1:0;
                const cb = el('input',{type:'checkbox'});
                cb.checked = val===1;
                cb.onchange = e=>{
                  const jours = {...(rec.jours||{})};
                  jours[d] = e.target.checked?1:0;
                  saveRec(o.id,{jours});
                };
                return el('td',{style:{textAlign:'center',padding:'2px'}},cb);
              }),
              el('td',{style:{fontWeight:900,color:'#E8730A',textAlign:'center',background:'#FFF7ED'}},ttj(o))
            );
          }):[el('tr',{},el('td',{colSpan:4+nDays,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucun employé — ajoutez des employés dans la section Employés'))]))
        )
      )
    );
  }

  // ---- Onglet Tableau de paiement ----
  if(tab==='tableau'){
    const rows = ouvriers.map(o=>{
      const rec = getRec(o);
      const nj = ttj(o);
      const pj = o.tauxJour||0;
      const totalPJ = nj*pj;
      const avance = rec.avance||0;
      const reste = totalPJ - avance;
      return {o,rec,nj,pj,totalPJ,avance,reste};
    });
    const totalReste = rows.reduce((s,r)=>s+r.reste,0);

    function printTableau(){
      const [y,m] = mois.split('-');
      const dernierJour = daysInMonth(mois);
      const rowsHTML = rows.map(({o,nj,pj,totalPJ,avance,reste})=>`
        <tr>
          <td>${o.nom} ${o.prenom||''}</td>
          <td style="text-align:center">${o.cin||'—'}</td>
          <td style="text-align:center">${fmtN(pj)}</td>
          <td style="text-align:center">${nj}</td>
          <td style="text-align:right">${fmtN(totalPJ)}</td>
          <td style="text-align:right">${fmtN(avance)}</td>
          <td style="text-align:right;font-weight:700">${fmtN(reste)}</td>
          <td></td>
        </tr>`).join('');
      const html = `
        <div>
          ${headerHTML()}
          <h2 style="text-align:center;text-decoration:underline;margin:14px 0;">TABLEAU DE PAIEMENT</h2>
          <div style="display:flex;justify-content:space-between;margin-bottom:14px;font-weight:700;">
            <div>MOIS : ${m}/${y.slice(2)}</div>
            <div>DU : 01/${m}/${y}</div>
            <div>AU : ${dernierJour}/${m}/${y}</div>
          </div>
          <table>
            <thead><tr>
              <th>NOM ET PRÉNOM</th><th>N° CIN</th><th>P - J</th><th>N - J</th>
              <th>TOTAL P/J</th><th>AVANCE</th><th>TOTAL REST</th><th>SIGNATURE</th>
            </tr></thead>
            <tbody>${rowsHTML}</tbody>
          </table>
        </div>`;
      printDoc(html, 'Tableau de paiement - '+mois);
    }

    return div({},
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        div({style:{fontSize:18,fontWeight:800}},'Fiches de paie'),
        btn('🖨 Imprimer le tableau','btn-orange',printTableau)
      ),
      tabsBar,
      div({style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},el('label',{className:'lbl'},'Mois'),moisInput),
      div({className:'card'},

function getChequeTemplate(banque){
  const templates = (state.settings && state.settings.chequeTemplates) || {};
  if(templates[banque]) return templates[banque];
  const presets = {
    'BMCE Bank Of Africa': {
      montantChiffresX:150, montantChiffresY:10,
      montantLettresX:15, montantLettresY:19,
      beneficiaireX:15, beneficiaireY:29,
      villeX:100, villeY:57,
      dateX:140, dateY:57,
    }
  };
  return presets[banque] || {
    montantChiffresX:145, montantChiffresY:12,
    montantLettresX:12, montantLettresY:20,
    beneficiaireX:12, beneficiaireY:32,
    villeX:115, villeY:52,
    dateX:145, dateY:52,
  };
}
function saveChequeTemplate(banque, tpl){
  const templates = {...((state.settings && state.settings.chequeTemplates)||{})};

  setState({settings:{...state.settings, chequeTemplates:templates}});
}

function renderCheques(){
  const cheques=state.cheques||[];
  const totC=cheques.filter(c=>c.type==='Chèque').reduce((s,c)=>s+c.montant,0);
  const totA=cheques.filter(c=>c.type==='Avance').reduce((s,c)=>s+c.montant,0);

  function echeanceInfo(c){
    if(c.statut==='Encaissé' || !c.echeance) return {level:'ok'};
    const todayD = new Date(today()+'T00:00:00');
    const echD = new Date(c.echeance+'T00:00:00');
    const diffDays = Math.round((echD-todayD)/(1000*60*60*24));
    if(diffDays<0) return {level:'overdue', diffDays};
    if(diffDays<=2) return {level:'soon', diffDays};
    return {level:'ok', diffDays};
  }

  const alerts = cheques.map((c,i)=>({c,i,info:echeanceInfo(c)})).filter(x=>x.info.level!=='ok');
  const overdue = alerts.filter(x=>x.info.level==='overdue');
  const soon = alerts.filter(x=>x.info.level==='soon');

  return div({},
    (overdue.length||soon.length) ? div({className:'card',style:{background:overdue.length?'#FEE2E2':'#FEF3C7',border:'1.5px solid '+(overdue.length?'#EF444450':'#F59E0B50'),marginBottom:16,padding:'14px 16px'}},
      div({style:{fontWeight:800,color:overdue.length?'#EF4444':'#F59E0B',marginBottom:8,fontSize:13}},
        '⚠️ '+(overdue.length?overdue.length+' chèque(s)/avance(s) en retard':'')+(overdue.length&&soon.length?' · ':'')+(soon.length?soon.length+' échéance(s) proche (≤ 2 jours)':'')
      ),
      div({style:{display:'flex',flexDirection:'column',gap:4}},
        ...[...overdue,...soon].map(({c,info})=>
          div({style:{fontSize:12,color:'#1A2540'}},
            span({style:{fontWeight:700}},c.type+' N°'+c.num+' — '+(c.beneficiaire||'—')+' — '+fmt(c.montant)),
            ' · échéance '+fmtDate(c.echeance)+' · ',
            span({style:{fontWeight:800,color:info.level==='overdue'?'#EF4444':'#F59E0B'}},
              info.level==='overdue' ? ('en retard de '+Math.abs(info.diffDays)+' jour(s) — toujours Non payé') : (info.diffDays===0?"échéance aujourd'hui":'échéance dans '+info.diffDays+' jour(s)')
            )
          )
        )
      )
    ) : null,
    div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:20}},
      ...([['Chèques',fmt(totC),'#2563EB'],['Avances',fmt(totA),'#E8730A'],['Total',fmt(totC+totA),'#10B981']].map(([k,v,c])=>
        div({className:'stat-card card',style:{background:c+'15',border:`1.5px solid ${c}30`}},div({style:{fontSize:11,color:c,fontWeight:700,marginBottom:4}},k),div({style:{fontSize:18,fontWeight:900}},v))
      ))
    ),
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      div({style:{fontSize:18,fontWeight:800}},'Chèques & Avances'),
      div({style:{display:'flex',gap:8}},
        btn('🖨 Imprimer un chèque','btn-blue',()=>openChequePrintForm()),
        btn('+ Ajouter','btn-orange',()=>openChequeForm())
      )
    ),
    div({className:'card'},
      el('table',{},
        el('thead',{},el('tr',{},...['Type','N°','Bénéficiaire','Montant','Date','Échéance','Banque','Objet','Statut',''].map(h=>el('th',{},h)))),
        el('tbody',{},...(cheques.length?cheques.map((c,i)=>{
          const info = echeanceInfo(c);
          const rowBg = info.level==='overdue' ? '#FEE2E2' : info.level==='soon' ? '#FEF3C7' : (i%2===0?'#fff':'#FAFBFD');
          return el('tr',{style:{background:rowBg}},
          el('td',{},span({className:'badge',style:{background:c.type==='Chèque'?'#2563EB15':'#E8730A15',color:c.type==='Chèque'?'#2563EB':'#E8730A'}},c.type)),
          el('td',{style:{fontWeight:700}},c.num),el('td',{},c.beneficiaire||'—'),
          el('td',{style:{fontWeight:800,color:'#E8730A'}},fmt(c.montant)),
          el('td',{},fmtDate(c.date)),
          el('td',{},
            div({},fmtDate(c.echeance)),
            info.level==='overdue' ? div({style:{fontSize:10,fontWeight:800,color:'#EF4444'}},'⚠️ En retard') :
            info.level==='soon' ? div({style:{fontSize:10,fontWeight:800,color:'#F59E0B'}},'⏰ Proche') : null
          ),
          el('td',{style:{color:'#6B7A99'}},c.banque||'—'),el('td',{style:{fontSize:12,color:'#6B7A99'}},c.objet||'—'),
          el('td',{},el('button',{style:{background:c.statut==='Encaissé'?'#10B98120':'#FEF3C7',color:c.statut==='Encaissé'?'#10B981':'#F59E0B',border:'none',borderRadius:20,padding:'3px 10px',cursor:'pointer',fontWeight:700,fontSize:11},onclick:()=>{const nc=state.cheques.map((x,idx)=>idx!==i?x:{...x,statut:x.statut==='Encaissé'?'En cours':'Encaissé'});setState({cheques:nc});}},c.statut||'En cours')),
          el('td',{},div({style:{display:'flex',gap:6}},
            btn('✏️','btn-gray',()=>openChequeForm(c,i),{style:{padding:'4px 8px',fontSize:12}}),
            btn('✕','btn-red',()=>{if(confirmDelete())setState({cheques:state.cheques.filter((_,idx)=>idx!==i)});},{style:{padding:'4px 8px',fontSize:12}})
          ))
        );
        }):[el('tr',{},el('td',{colSpan:10,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucun chèque ou avance'))]))
      )
    )
  );
}

// ── BORDEREAU ────────────────────────────
function renderBordereauSection(p, updateProject){
  const bd = p.bordereau||[];
  const total = bd.reduce((s,b)=>s+(b.total||0),0);

  return div({},
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}},
      div({style:{fontSize:13,color:'#6B7A99'}},bd.length+' ligne(s) · Total HT: '+fmt(total)),
      div({style:{display:'flex',gap:8}},
        btn('📥 Import Excel','btn-blue',()=>{
          const input = el('input',{type:'file',accept:'.xlsx,.xls',style:{display:'none'}});
          input.onchange = e => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
              try {
                const wb = XLSX.read(ev.target.result, {type:'binary'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, {header:1,defval:''});
                const newBd = [];
                rows.forEach((row,i) => {
                  if(i===0) return;
                  const id = String(row[0]||'').trim();
                  const designation = String(row[1]||'').trim();
                  if(!designation) return;
                  const unite = String(row[2]||'').trim();
                  const qte = parseFloat(String(row[3]).replace(',','.'))||0;
                  const pu = parseFloat(String(row[4]).replace(',','.'))||0;
                  newBd.push({id,designation,unite,qte,pu,total:qte*pu});
                });
                if(newBd.length===0){alert('Aucune ligne trouvée.\nFormat attendu:\nCol A: N° Prix, Col B: Désignation, Col C: Unité, Col D: Quantité, Col E: P.U. HT');return;}
                if(confirm('Importer '+newBd.length+' lignes ?'+(bd.length>0?' (remplace les lignes existantes)':''))){
                  updateProject({bordereau:newBd});
                  notify(newBd.length+' lignes importées ✓');
                }
              } catch(err){ alert('Erreur lecture fichier: '+err.message); }
            };
            reader.onerror = ()=>alert('Erreur lecture fichier');
            reader.readAsBinaryString(file);
          };
          input.click();
        }),
        btn('+ Ajouter ligne','btn-orange',()=>{
          let f={id:'',designation:'',unite:'',qte:0,pu:0};
          const fEl=div({style:{display:'flex',flexDirection:'column',gap:12}},
            div({className:'grid-2'},
              div({},el('label',{className:'lbl'},'N° Prix'),Object.assign(el('input',{value:''}),{oninput:e=>f.id=e.target.value})),
              div({},el('label',{className:'lbl'},'Unité'),Object.assign(el('input',{value:''}),{oninput:e=>f.unite=e.target.value})),
              div({},el('label',{className:'lbl'},'Quantité'),Object.assign(el('input',{type:'number',value:0}),{oninput:e=>f.qte=+e.target.value})),
              div({},el('label',{className:'lbl'},'Prix Unitaire HT'),Object.assign(el('input',{type:'number',value:0}),{oninput:e=>f.pu=+e.target.value})),
            ),
            div({style:{gridColumn:'1/-1'}},el('label',{className:'lbl'},'Désignation'),Object.assign(el('input',{value:''}),{oninput:e=>f.designation=e.target.value})),
            div({style:{display:'flex',gap:10,justifyContent:'flex-end'}},
              btn('Annuler','btn-gray',()=>setState({modal:null})),
              btn('Enregistrer','btn-orange',()=>{
                if(!f.designation){alert('Désignation obligatoire');return;}
                f.total=f.qte*f.pu;
                updateProject({bordereau:[...bd,{...f}]});
                setState({modal:null});notify('Ligne ajoutée ✓');
              })
            )
          );
          setState({modal:{title:'Nouvelle ligne Bordereau',content:fEl,wide:true}});
        })
      )
    ),
    div({className:'card'},
      div({style:{overflowX:'auto'}},
        el('table',{},
          el('thead',{},el('tr',{},...['N° Prix','Désignation','Unité','Quantité','P.U. HT','Total HT',''].map(h=>el('th',{},h)))),
          el('tbody',{},...(bd.length?bd.map((b,i)=>
            el('tr',{},
              el('td',{style:{fontWeight:700,color:'#2563EB'}},b.id||'—'),

    let v = 'list';
    return [()=>v, (nv)=>{v=nv; updateProject({});}];
  })();

  const getQtePrecedente = (bId, beforeIdx) => {
    let c=0;
    for(let i=0;i<beforeIdx;i++){
      const l=(atts[i].lignes||[]).find(l=>l.id===bId);
      if(l) c+=(l.qteMois||0);
    }

    if(!window.XLSX){alert('XLSX non disponible');return;}
    const rows=[['N° Att','Date','Du','Au','Total HT']];
    atts.forEach(a=>{rows.push([a.num,a.date?fmtDate(a.date):'-',a.du?fmtDate(a.du):'-',a.au?fmtDate(a.au):'-',a.total||0]);});
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Attachements');
    XLSX.writeFile(wb,'Attachements_'+p.ref+'.xlsx');

                  btn('💾 Enregistrer','btn-green',()=>{
                    const total=editLignes.reduce((s,l)=>s+(l.qteMois||0)*(l.pu||0),0);
                    let updated=atts.map((x,xi)=>xi===i?{...x,...editForm,lignes:editLignes,total}:x);
                    // Recalcul automatique des attachements suivants
                    for(let ai=i+1;ai<updated.length;ai++){
                      const recalcLg=(updated[ai].lignes||[]).map(l=>{
                        let qteP=0;
                        for(let pi=0;pi<ai;pi++){const pl=(updated[pi].lignes||[]).find(x=>x.id===l.id);if(pl)qteP+=(pl.qteMois||0);}
                        const cumul=qteP+(l.qteMois||0);
                        const pct=l.qteBD>0?Math.round(cumul/l.qteBD*1000)/10:0;
                        return {...l,qtePrecedente:qteP,cumul,pct};
                      });
                      const recalcTotal=recalcLg.reduce((s,l)=>s+(l.qteMois||0)*(l.pu||0),0);
                      updated[ai]={...updated[ai],lignes:recalcLg,total:recalcTotal};
                    }
                    updateProject({attachements:updated});
                    setState({modal:null});
                    notify('Attachement mis à jour ✓');
                  })
                );
                setState({modal:{title:'Modifier Attachement N°'+a.num,content:formEl,wide:true}});
              },{style:{padding:'4px 8px',fontSize:12}}),
              btn('🗑','btn-red',()=>{if(confirmDelete())updateProject({attachements:atts.filter((_,idx)=>idx!==i)});},{style:{padding:'4px 8px',fontSize:12}})
            ))
          )
        ):[el('tr',{},el('td',{colSpan:6,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucun attachement'))]))
      )
    )
  );
}

function renderDecomptesSection(p, updateProject){
  const atts = p.attachements||[];
  const TVA = 0.20, RG = (p.tauxRG!=null ? p.tauxRG/100 : 0.10);

  if(atts.length===0) return div({className:'card',style:{padding:40,textAlign:'center',color:'#6B7A99'}},
    div({style:{fontSize:28,marginBottom:8}},'💰'),
    div({style:{fontWeight:700}},"Créez d'abord des Attachements"),
    div({style:{fontSize:12,marginTop:6}},"Les décomptes sont générés automatiquement depuis les attachements")
  );

  return div({},
    div({style:{fontSize:15,fontWeight:800,marginBottom:16}},'Décomptes Provisoires'),
    div({style:{display:'flex',flexDirection:'column',gap:12}},
      ...atts.map((att,i)=>{
        const lignes = att.lignes||[];
        const totalHT = lignes.reduce((s,l)=>s+l.qteMois*(l.pu||0),0);
        const tva = totalHT*TVA, ttc = totalHT+tva;
        const rgCap = (p.budget||0)*0.07;
        let cumulRGAvant=0;
        for(let idx=0; idx<i; idx++){
          const d2=atts[idx];
          if(d2.definitif){ cumulRGAvant += (d2.rgManuel||0); continue; }
          const th2=(d2.lignes||[]).reduce((ss,l)=>ss+(l.qteMois||0)*(l.pu||0),0);
          const ttc2=th2*(1+TVA);
          const remaining2=Math.max(0, rgCap-cumulRGAvant);
          cumulRGAvant += Math.min(ttc2*RG, remaining2);
        }
        const remaining = Math.max(0, rgCap-cumulRGAvant);
        const rg = att.definitif ? (att.rgManuel||0) : Math.min(ttc*RG, remaining);
        const n2 = ttc - rg;
        const cumHT = lignes.reduce((s,l)=>s+(l.cumul||0)*(l.pu||0),0);
        const cumN2 = cumHT*(1+TVA)*(1-RG);

        return div({className:'card',style:{overflow:'hidden'}},
          div({style:{background:'linear-gradient(135deg,#0F1628,#1A2D50)',padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            div({},
              div({style:{fontSize:12,color:'#6A8099'}},'DÉCOMPTE PROVISOIRE N°'),

            div({style:{textAlign:'right'}},
              div({style:{fontSize:11,color:'#6A8099'}},'Total N2 Mois'),
              div({style:{fontSize:20,fontWeight:900,color:'#E8730A'}},fmt(n2))

          div({style:{padding:'14px 18px'}},
            div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10,marginBottom:14}},
              ...([['Total HT',fmt(totalHT),'#2563EB'],['TVA 20%',fmt(tva),'#6B7A99'],['Total TTC',fmt(ttc),'#E8730A'],['Total N2 (RG '+(RG*100)+'%)',fmt(n2),'#10B981']].map(([k,v,c])=>
                div({style:{background:c+'10',border:'1px solid '+c+'30',borderRadius:8,padding:'8px 10px'}},
                  div({style:{fontSize:10,color:c,fontWeight:700}}),

                const rows = lignes.map((l,li)=>el('tr',{style:{borderBottom:'1px solid #E5E9F2',background:li%2===0?'#fff':'#FAFBFD'}},
                  el('td',{style:{fontWeight:700,color:'#2563EB',fontSize:11}},l.id),
                  el('td',{style:{fontSize:11,maxWidth:200}},l.designation),
                  el('td',{style:{textAlign:'center'}},l.unite),
                  el('td',{style:{textAlign:'right',color:'#6B7A99'}},fmtQte(l.qteBD)),
                  el('td',{style:{textAlign:'right',color:'#6B7A99'}},fmtQte(l.qtePrecedente)),
                  el('td',{style:{textAlign:'right',fontWeight:800,color:'#E8730A'}},fmtQte(l.qteMois)),
                  el('td',{style:{textAlign:'right',fontWeight:700,color:'#2563EB'}},fmtQte(l.cumul)),
                  el('td',{style:{textAlign:'right'}},fmtN(l.pu)),
                  el('td',{style:{textAlign:'right',fontWeight:800,color:'#E8730A'}},fmtN(l.qteMois*(l.pu||0)*(1+TVA))),

                const detailEl = div({style:{overflowX:'auto'}},

function printDecompte(att, p){
  const TVA=0.20, RGrate=(p.tauxRG!=null ? p.tauxRG/100 : 0.10);
  const lignes=att.lignes||[];
  const cumHT=lignes.reduce((s,l)=>s+(l.cumul||0)*(l.pu||0),0);
  // TOTAL EN DH HT / TVA / TOTAL TTC affichés = CUMULATIF à date (information/historique)
  const tva=cumHT*TVA,ttc=cumHT+tva;

  // Le calcul de la Retenue de Garantie et du Net à Payer se fait UNIQUEMENT
  // sur la Qté du mois (montant du mois), pas sur le cumul — avec un plafond
  // progressif de 7% du budget total du marché.
  const atts2=p.attachements||[];
  const attIdx=atts2.indexOf(att);
  const rgCap=(p.budget||0)*0.07;
  const totalHTMois=lignes.reduce((s,l)=>s+(l.qteMois||0)*(l.pu||0),0);
  const ttcMois=totalHTMois*(1+TVA);
  let cumulRGAvant=0;
  for(let idx=0; idx<attIdx; idx++){
    const d2=atts2[idx];
    if(d2.definitif){ cumulRGAvant += (d2.rgManuel||0); continue; }
    const th2=(d2.lignes||[]).reduce((ss,l)=>ss+(l.qteMois||0)*(l.pu||0),0);
    const ttc2=th2*(1+TVA);
    const remaining2=Math.max(0, rgCap-cumulRGAvant);
    cumulRGAvant += Math.min(ttc2*RGrate, remaining2);

  const remaining=Math.max(0, rgCap-cumulRGAvant);
  const rg = att.definitif ? (att.rgManuel||0) : Math.min(ttcMois*RGrate, remaining);
  // NET À PAYER = Total TTC du mois − Retenue de Garantie du mois

// ── RAPPORT CHANTIER ─────────────────────
function renderRapportSection(p, updateProject){
  const rapports2 = p.rapports2||{};
  const bd = p.bordereau||[];
  const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const getML=k=>{const[y,m]=k.split('-');return MFR[+m-1]+' '+y;};
  const getWO=d=>{const dt=new Date(d),f=new Date(dt.getFullYear(),dt.getMonth(),1);return Math.ceil((dt.getDate()+f.getDay())/7);};
  const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

  if(!p._rapportTab) p._rapportTab='journalier';
  if(!p._rapportView) p._rapportView='months';

  const saveRapport=(month,data)=>{
    const r2={...rapports2,[month]:data};
    updateProject({rapports2:r2});
  };
  const getTotal=(bId,lignes)=>lignes.reduce((s,l)=>s+(parseFloat(l.qtes&&l.qtes[bId])||0),0);

  // ── VUE LISTE DES MOIS ──────────────────────────────────────────
  if(p._rapportView==='months'){
    return div({},
      div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
        div({style:{fontSize:15,fontWeight:800}},'Rapports Chantier'),
        btn('+ Ajouter Mois','btn-orange',()=>{
          const k=today().substring(0,7);
          if(!rapports2[k]) saveRapport(k,{lignes:[]});
          p._selMonth=k; p._rapportView='detail'; p._rapportTab='journalier'; updateProject({});
        })
      ),
      Object.keys(rapports2).length===0
        ? div({className:'card',style:{padding:50,textAlign:'center',color:'#6B7A99'}},
            div({style:{fontSize:32,marginBottom:10}},'📋'),
            div({style:{fontWeight:700}},'Aucun rapport — cliquez "+ Ajouter Mois"')
          )
        : div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}},
            ...Object.keys(rapports2).sort().map(k=>{
              const lg=rapports2[k]?.lignes||[];
              const wks=new Set(lg.map(l=>getWO(l.date))).size;
              return div({className:'card',style:{overflow:'hidden'}},
                div({style:{background:'linear-gradient(135deg,#0F1628,#1A2D50)',padding:'12px 14px'}},
                  div({style:{fontSize:14,fontWeight:900,color:'#fff'}},getML(k)),
                  div({style:{fontSize:11,color:'#6A8099'}},lg.length+' jour(s) · '+wks+' sem.')
                ),
                div({style:{padding:'12px 14px',display:'flex',gap:8}},
                  btn('📂 Ouvrir','btn-blue',()=>{p._selMonth=k;p._rapportView='detail';p._rapportTab='journalier';updateProject({});},{style:{flex:1,fontSize:12}}),
                  btn('✏️','btn-gray',()=>{
                    const inp=Object.assign(el('input',{type:'month',value:k,style:{padding:'6px 10px',fontSize:13,borderRadius:6,border:'1px solid #E5E9F2',width:'100%'}}));
                    const fEl=div({style:{display:'flex',flexDirection:'column',gap:12}},
                      div({},el('label',{className:'lbl'},'Nouveau mois'),inp),
                      div({style:{display:'flex',gap:8,justifyContent:'flex-end'}},
                        btn('Annuler','btn-gray',()=>setState({modal:null})),
                        btn('✓ Enregistrer','btn-orange',()=>{
                          const nk=inp.value;
                          if(!nk){alert('Choisissez un mois');return;}
                          if(nk===k){setState({modal:null});return;}
                          const r={...rapports2};
                          r[nk]=r[k]; delete r[k];
                          updateProject({rapports2:r});
                          setState({modal:null});
                        })
                      )
                    );
                    setState({modal:{title:'Modifier le mois',content:fEl}});
                  },{style:{padding:'6px 10px',fontSize:12}}),
                  btn('🗑','btn-red',()=>{if(confirmDelete()){const r={...rapports2};delete r[k];updateProject({rapports2:r});}},{style:{padding:'6px 10px',fontSize:12}})
                )
              );
            })
          )
    );
  }

  // ── VUE DETAIL D'UN MOIS ────────────────────────────────────────
  const selMonth = p._selMonth;
  const lignes = rapports2[selMonth]?.lignes||[];
  const weeks = [...new Set(lignes.map(l=>getWO(l.date)))].sort((a,b)=>a-b);
  const tab = p._rapportTab||'journalier';

  const tabBtn=(label,key)=>btn(label, tab===key?'btn-orange':'btn-gray', ()=>{p._rapportTab=key;updateProject({});},{style:{fontSize:12,minWidth:110}});

  // Calcul hebdomadaire
  const getWeekRows=()=>{
    const wkMap={};
    lignes.forEach(l=>{
      const wk=getWO(l.date);
      if(!wkMap[wk]) wkMap[wk]={wk,days:new Set(),qtes:{}};
      wkMap[wk].days.add(l.date);
      bd.forEach(b=>{wkMap[wk].qtes[b.id]=(wkMap[wk].qtes[b.id]||0)+(parseFloat(l.qtes&&l.qtes[b.id])||0);});
    });
    return Object.values(wkMap).sort((a,b)=>a.wk-b.wk);
  };

  // Calcul mensuel
  const monthTotals={};
  bd.forEach(b=>{monthTotals[b.id]=getTotal(b.id,lignes);});
  const monthTotal=bd.reduce((s,b)=>s+(monthTotals[b.id]||0),0);

  return div({},
    // Header
    div({style:{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}},
      btn('← Rapports','btn-gray',()=>{p._rapportView='months';p._selMonth=null;updateProject({});},{style:{fontSize:12}}),
      div({style:{fontWeight:800,fontSize:16,flex:1}},'📋 '+getML(selMonth)),
      btn('🖨️ Imprimer','btn-orange',()=>{
        const s2=getSettings();
        const DAYS2=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
        const rowsHTML=lignes.map((l,li)=>{
          const rt=bd.reduce((s,b)=>s+(parseFloat(l.qtes&&l.qtes[b.id])||0),0);
          return `<tr style="background:${li%2===0?'#fff':'#fafbfd'}">
            <td style="padding:4px 6px;font-weight:700;color:#2563EB;white-space:nowrap;width:75px;font-size:10px">${fmtDate(l.date)}</td>
            <td style="padding:6px 8px">${l.secteur||''}</td>
            <td style="padding:6px 8px;min-width:120px">${l.adresse||''}</td>
            <td style="padding:6px 8px">${l.piecesReparer||''}</td>
            ${bd.map(b=>`<td style="padding:4px 2px;text-align:center;width:32px;font-weight:${(l.qtes&&l.qtes[b.id]>0)?'700':'400'};color:${(l.qtes&&l.qtes[b.id]>0)?'#E8730A':'#999'};font-size:10px">${(l.qtes&&l.qtes[b.id]>0)?fmtN(l.qtes[b.id]):'-'}</td>`).join('')}
            <td style="padding:4px 6px;text-align:right;font-weight:800;font-size:10px;color:${rt>0?'#E8730A':'#999'}">${rt>0?fmtN(rt):'-'}</td>
          </tr>`;
        }).join('');
        const totalRow=`<tr style="background:#0F1628">
          <td colspan="4" style="padding:8px;font-weight:900;color:#fff;font-size:12px">TOTAL MENSUEL</td>
          ${bd.map(b=>`<td style="padding:5px 2px;text-align:center;font-weight:900;color:#E8730A;font-size:10px;width:32px">${fmtN(getTotal(b.id,lignes))||'-'}</td>`).join('')}
          <td style="padding:5px 6px;text-align:right;font-weight:900;color:#E8730A;font-size:10px">${fmtN(bd.reduce((s,b)=>s+getTotal(b.id,lignes),0))}</td>
        </tr>`;
        const html=`
          <div style="font-weight:900;font-size:14px;margin-bottom:6px;">${s2.nom||'SMERAV S.A.R.L.au'}</div>
          <table style="width:100%;border-collapse:collapse;margin-bottom:8px;font-size:11px;">
            <tr>
              <td style="border:1px solid #999;padding:6px 10px;width:50%"><span style="font-size:8px;color:#666;display:block">Maître d'ouvrage</span><strong>${p.maitreOuvrage||'—'}</strong></td>
              <td style="border:1px solid #999;padding:6px 10px"><span style="font-size:8px;color:#666;display:block">Marché N°</span><strong>${p.marcheNum||'—'}</strong></td>
            </tr>
            <tr><td colspan="2" style="border:1px solid #999;padding:6px 10px"><span style="font-size:8px;color:#666;display:block">Objet</span><strong>${p.objet||p.nom||''}</strong></td></tr>
            <tr><td colspan="2" style="border:1px solid #999;padding:7px;text-align:center;font-weight:900;font-size:13px;background:#e0e0e0">
              RAPPORT JOURNALIER — ${getML(selMonth)}
            </td></tr>
          </table>
          <table style="width:100%;border-collapse:collapse;font-size:11px;">
            <thead><tr style="background:#0F1628">
              <th style="padding:8px;color:#6A8099;font-size:10px;text-align:left">Date</th>
              <th style="padding:8px;color:#6A8099;font-size:10px;text-align:left">Secteur</th>
              <th style="padding:8px;color:#6A8099;font-size:10px;text-align:left">Adresse</th>
              <th style="padding:8px;color:#6A8099;font-size:10px;text-align:left">Pièces</th>
              ${bd.map(b=>`<th style="padding:4px 2px;color:#E8730A;font-size:9px;text-align:center;width:32px">${b.id}</th>`).join('')}
              <th style="padding:4px 6px;color:#6A8099;font-size:9px;text-align:right;width:40px">Total</th>
            </tr></thead>
            <tbody>${rowsHTML}${totalRow}</tbody>
          </table>
          <table style="width:100%;border-collapse:collapse;margin-top:20px;font-size:11px;">
            <tr>
              <td style="border:1px solid #ccc;padding:7px 12px;font-weight:700;text-align:center;width:50%">${p.maitreOuvrage||'Maître d\'ouvrage'} (Chargé de suivi)</td>
              <td style="border:1px solid #ccc;padding:7px 12px;font-weight:700;text-align:center">Représentant Entreprise</td>
            </tr>
            <tr>
              <td style="border:1px solid #ccc;height:50px"></td>
              <td style="border:1px solid #ccc;text-align:center;font-weight:700;color:#6B7A99">${s2.nom||'SMERAV'}</td>
            </tr>
          </table>`;
        printDoc(html,'Rapport '+getML(selMonth), {landscape:true});
      },{style:{fontSize:12}}),
      btn('→ Transférer Attachement','btn-green',()=>{
        const totaux={};
        bd.forEach(b=>{totaux[b.id]=getTotal(b.id,lignes);});
        const atts=p.attachements||[];
        const[y,m]=selMonth.split('-');
        let idx=atts.findIndex(a=>a.du&&a.du.startsWith(selMonth));
        const newLg=bd.map(b=>{
          const ai=idx>=0?idx:atts.length;
          let c=0;for(let i=0;i<ai;i++){const al=atts[i],ll=(al.lignes||[]).find(l=>l.id===b.id);if(ll)c+=(ll.qteMois||0);}
          const qteP=c,qteBD=b.qte||0,qteMois=totaux[b.id]||0,cumul=qteP+qteMois;
          return{id:b.id,designation:b.designation,unite:b.unite,qteBD,pu:b.pu||0,qtePrecedente:qteP,qteMois,cumul,pct:qteBD>0?Math.round(cumul/qteBD*1000)/10:0};
        });
        const total=newLg.reduce((s,l)=>s+l.qteMois*(l.pu||0),0);
        const lastDay=new Date(+y,+m,0).getDate();
        if(idx>=0){updateProject({attachements:atts.map((a,i)=>i!==idx?a:{...a,lignes:newLg,total})});notify('Attachement mis à jour ✓');}
        else{const num=String(atts.length+1).padStart(2,'0');updateProject({attachements:[...atts,{num,date:today(),du:y+'-'+m+'-01',au:y+'-'+m+'-'+lastDay,lignes:newLg,total}]});notify('Attachement N°'+num+' créé ✓');}

      tabBtn('📅 Journalier','journalier'),
      tabBtn('📆 Hebdomadaire','hebdomadaire'),

    ),

    // ── TAB JOURNALIER ──
    tab==='journalier' ? div({},
      div({style:{display:'flex',justifyContent:'flex-end',marginBottom:10}},
        btn('+ Ajouter ligne','btn-orange',()=>{
          let nr={date:'',secteur:'',adresse:'',piecesReparer:'',qtes:{}};
          const lC=div({});
          function rL(){lC.innerHTML='';if(bd.length>0)lC.appendChild(div({style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:6,maxHeight:180,overflowY:'auto',padding:4}},
            ...bd.map(b=>div({style:{background:'#F8FAFD',borderRadius:7,padding:'7px 8px'}},
              div({style:{fontSize:10,fontWeight:700,color:'#E8730A',marginBottom:3}},b.id+' ('+b.unite+')'),

            ))
          ));}
          rL();
          const fEl=div({style:{display:'flex',flexDirection:'column',gap:12}},
            div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:10}},
              div({},el('label',{className:'lbl'},'Date *'),Object.assign(el('input',{type:'date',value:''}),{oninput:e=>nr.date=e.target.value})),
              div({},el('label',{className:'lbl'},'Secteur'),Object.assign(el('input',{value:''}),{oninput:e=>nr.secteur=e.target.value})),
              div({},el('label',{className:'lbl'},'Adresse'),Object.assign(el('input',{value:''}),{oninput:e=>nr.adresse=e.target.value})),
              div({},el('label',{className:'lbl'},'Pièces'),Object.assign(el('input',{value:''}),{oninput:e=>nr.piecesReparer=e.target.value})),
            ),
            bd.length>0?div({},el('label',{className:'lbl'},'Quantités par N° de prix'),lC):null,
            div({style:{display:'flex',gap:10,justifyContent:'flex-end'}},
              btn('Annuler','btn-gray',()=>setState({modal:null})),
              btn('✓ Ajouter','btn-orange',()=>{
                if(!nr.date){alert('Date obligatoire');return;}
                const k=nr.date.substring(0,7);
                const ex=rapports2[k]||{lignes:[]};
                const newLignes=[...ex.lignes,{...nr}].sort((a,b)=>a.date.localeCompare(b.date));
                saveRapport(k,{...ex,lignes:newLignes});
                setState({modal:null});
              })
            )
          );
          setState({modal:{title:'Ajouter une ligne',content:fEl,wide:true}});
        },{style:{fontSize:12}})
      ),
      div({className:'card',style:{overflow:'hidden'}},
        div({style:{overflowX:'auto'}},
          el('table',{},
            el('thead',{},el('tr',{style:{background:'#0F1628'}},
              ...['Date','Secteur','Adresse','Pièces',...bd.map(b=>b.id),'Total',''].map((h,i)=>
                el('th',{style:{padding:'9px 8px',color:i>=4&&i<4+bd.length?'#E8730A':'#6A8099',fontWeight:700,fontSize:10,textAlign:i>=4?'center':'left',whiteSpace:'nowrap'}},h)
              )
            )),
            el('tbody',{},...weeks.map(wk=>{
              const wkL=lignes.filter(l=>getWO(l.date)===wk);
              const wkT=bd.map(b=>getTotal(b.id,wkL));
              return [
                ...wkL.map((l,li)=>{
                  const rt=bd.reduce((s,b)=>s+(parseFloat(l.qtes&&l.qtes[b.id])||0),0);
                  const idx=lignes.indexOf(l);
                  return el('tr',{style:{borderBottom:'1px solid #E5E9F2',background:idx%2===0?'#fff':'#FAFBFD'}},
                    el('td',{style:{padding:'7px 8px',fontWeight:700,color:'#2563EB',fontSize:11,whiteSpace:'nowrap'}},DAYS[new Date(l.date).getDay()]+' '+fmtDate(l.date)),
                    el('td',{style:{padding:'4px 6px'}},Object.assign(el('input',{value:l.secteur||'',style:{width:80,border:'1px solid transparent',borderRadius:4,padding:'3px 5px',fontSize:11,background:'transparent'}}),{oninput:e=>{const nl=[...lignes];nl[idx]={...nl[idx],secteur:e.target.value};saveRapport(selMonth,{...rapports2[selMonth],lignes:nl});},onfocus:e=>e.target.style.borderColor='#E8730A',onblur:e=>e.target.style.borderColor='transparent'})),
                    el('td',{style:{padding:'4px 6px'}},Object.assign(el('input',{value:l.adresse||'',style:{width:90,border:'1px solid transparent',borderRadius:4,padding:'3px 5px',fontSize:11,background:'transparent'}}),{oninput:e=>{const nl=[...lignes];nl[idx]={...nl[idx],adresse:e.target.value};saveRapport(selMonth,{...rapports2[selMonth],lignes:nl});},onfocus:e=>e.target.style.borderColor='#E8730A',onblur:e=>e.target.style.borderColor='transparent'})),
                    el('td',{style:{padding:'4px 6px'}},Object.assign(el('input',{value:l.piecesReparer||'',style:{width:80,border:'1px solid transparent',borderRadius:4,padding:'3px 5px',fontSize:11,background:'transparent'}}),{oninput:e=>{const nl=[...lignes];nl[idx]={...nl[idx],piecesReparer:e.target.value};saveRapport(selMonth,{...rapports2[selMonth],lignes:nl});},onfocus:e=>e.target.style.borderColor='#E8730A',onblur:e=>e.target.style.borderColor='transparent'})),
                    ...bd.map(b=>el('td',{style:{padding:'3px 4px',textAlign:'center'}},Object.assign(el('input',{type:'number',min:0,step:0.01,value:l.qtes&&l.qtes[b.id]||'',style:{width:50,textAlign:'center',border:'1px solid #E5E9F2',borderRadius:4,padding:'3px',fontSize:11,background:l.qtes&&l.qtes[b.id]>0?'#FFF8F0':'#F8FAFD',color:l.qtes&&l.qtes[b.id]>0?'#E8730A':'#6B7A99'}}),{oninput:e=>{const nl=[...lignes];if(!nl[idx].qtes)nl[idx].qtes={};nl[idx].qtes[b.id]=parseFloat(e.target.value)||0;saveRapport(selMonth,{...rapports2[selMonth],lignes:nl});}}))),
                    el('td',{style:{padding:'7px 6px',textAlign:'right',fontWeight:800,color:rt>0?'#E8730A':'#6B7A99',fontSize:11}},rt>0?fmtN(rt):'-'),
                    el('td',{},btn('✕','btn-red',()=>{const nl=lignes.filter((_,oi)=>oi!==idx);saveRapport(selMonth,{...rapports2[selMonth],lignes:nl});},{style:{padding:'3px 7px',fontSize:10}}))
                  );
                }),
                el('tr',{key:'w'+wk,style:{background:'#FFF3E0',borderTop:'2px solid #E8730A40'}},
                  el('td',{colSpan:4,style:{padding:'7px 8px',fontWeight:800,fontSize:11,color:'#E8730A'}},'∑ Semaine '+wk+' ('+wkL.length+'j.)'),
                  ...bd.map((b,bi)=>el('td',{style:{padding:'7px 5px',textAlign:'center',fontWeight:800,color:wkT[bi]>0?'#E8730A':'#6B7A99',fontSize:11}},wkT[bi]>0?fmtN(wkT[bi]):'-')),
                  el('td',{style:{padding:'7px 6px',textAlign:'right',fontWeight:900,color:'#E8730A',fontSize:11}},fmtN(wkT.reduce((s,t)=>s+t,0))),
                  el('td',{})
                )
              ];
            }),
            lignes.length>0?el('tr',{style:{background:'#0F1628'}},
              el('td',{colSpan:4,style:{padding:'9px 8px',fontWeight:900,color:'#fff',fontSize:12}},'TOTAL MENSUEL'),
              ...bd.map(b=>el('td',{style:{padding:'9px 5px',textAlign:'center',fontWeight:900,color:'#E8730A',fontSize:12}},fmtN(getTotal(b.id,lignes))||'-')),
              el('td',{style:{padding:'9px 6px',textAlign:'right',fontWeight:900,color:'#E8730A'}},fmtN(bd.reduce((s,b)=>s+getTotal(b.id,lignes),0))),
              el('td',{})
            ):null,
            lignes.length===0?el('tr',{},el('td',{colSpan:bd.length+6,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucune ligne — cliquez "+ Ajouter ligne"')):null
            )
          )
        )
      )
    ) : null,

    // ── TAB HEBDOMADAIRE ──
    tab==='hebdomadaire' ? div({className:'card',style:{overflow:'hidden'}},
      div({style:{overflowX:'auto'}},
        el('table',{style:{width:'100%',borderCollapse:'collapse'}},
          el('thead',{},el('tr',{style:{background:'#0F1628'}},
            el('th',{style:{padding:'9px 10px',color:'#6A8099',fontWeight:700,fontSize:10,textAlign:'left'}},'Semaine'),
            el('th',{style:{padding:'9px 10px',color:'#6A8099',fontWeight:700,fontSize:10,textAlign:'center'}},'Jours travaillés'),
            ...bd.map(b=>el('th',{style:{padding:'9px 6px',color:'#E8730A',fontWeight:700,fontSize:10,textAlign:'center',whiteSpace:'nowrap'}},b.id)),
            el('th',{style:{padding:'9px 10px',color:'#6A8099',fontWeight:700,fontSize:10,textAlign:'right'}},'Total')
          )),
          el('tbody',{},...getWeekRows().map((w,i)=>{
            const total=bd.reduce((s,b)=>s+(w.qtes[b.id]||0),0);
            return el('tr',{style:{borderBottom:'1px solid #E5E9F2',background:i%2===0?'#fff':'#FAFBFD'}},
              el('td',{style:{padding:'9px 10px',fontWeight:800,color:'#E8730A',fontSize:12}},'Semaine '+w.wk),
              el('td',{style:{padding:'9px 10px',textAlign:'center',color:'#6B7A99',fontSize:12}},w.days.size+' j.'),
              ...bd.map(b=>el('td',{style:{padding:'9px 6px',textAlign:'center',fontWeight:700,color:w.qtes[b.id]>0?'#E8730A':'#6B7A99',fontSize:12}},w.qtes[b.id]>0?fmtN(w.qtes[b.id]):'-')),
              el('td',{style:{padding:'9px 10px',textAlign:'right',fontWeight:900,color:total>0?'#E8730A':'#6B7A99',fontSize:12}},total>0?fmtN(total):'-')
            );
          }),
          lignes.length===0?el('tr',{},el('td',{colSpan:bd.length+3,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucune donnée')):null
          )
        )
      )
    ) : null,

    // ── TAB MENSUEL ──
    tab==='mensuel' ? div({className:'card',style:{overflow:'hidden'}},
      div({style:{overflowX:'auto'}},
        el('table',{style:{width:'100%',borderCollapse:'collapse'}},
          el('thead',{},el('tr',{style:{background:'#0F1628'}},
            el('th',{style:{padding:'9px 10px',color:'#6A8099',fontWeight:700,fontSize:10,textAlign:'left'}},'Mois'),
            ...bd.map(b=>el('th',{style:{padding:'9px 6px',color:'#E8730A',fontWeight:700,fontSize:10,textAlign:'center',whiteSpace:'nowrap'}},b.id)),
            el('th',{style:{padding:'9px 10px',color:'#6A8099',fontWeight:700,fontSize:10,textAlign:'right'}},'Total')
          )),
          el('tbody',{},
            el('tr',{style:{borderBottom:'1px solid #E5E9F2'}},
              el('td',{style:{padding:'12px 10px',fontWeight:800,color:'#2563EB',fontSize:13}},getML(selMonth)),
              ...bd.map(b=>el('td',{style:{padding:'12px 6px',textAlign:'center',fontWeight:700,color:monthTotals[b.id]>0?'#E8730A':'#6B7A99',fontSize:13}},monthTotals[b.id]>0?fmtN(monthTotals[b.id]):'-')),
              el('td',{style:{padding:'12px 10px',textAlign:'right',fontWeight:900,color:monthTotal>0?'#E8730A':'#6B7A99',fontSize:13}},monthTotal>0?fmtN(monthTotal):'-')
            ),
            lignes.length===0?el('tr',{},el('td',{colSpan:bd.length+2,style:{padding:40,textAlign:'center',color:'#6B7A99'}},'Aucune donnée')):null
          )
        )
      )
    ) : null,

    // Signature
    div({style:{background:'#fff',borderRadius:12,border:'1px solid #E5E9F2',overflow:'hidden',marginTop:14}},
      el('table',{style:{width:'100%',borderCollapse:'collapse'}},
        el('tbody',{},
          el('tr',{},
            el('td',{style:{border:'1px solid #ccc',padding:'7px 12px',fontWeight:700,fontSize:12,textAlign:'center',textDecoration:'underline',width:'50%'}},p.maitreOuvrage||'Maître d\'ouvrage'+' (Chargé de suivi)'),
            el('td',{style:{border:'1px solid #ccc',padding:'7px 12px',fontWeight:700,fontSize:12,textAlign:'center',textDecoration:'underline'}},'Représentant Entreprise')
          ),
          el('tr',{},
            el('td',{style:{border:'1px solid #ccc',height:60}}),
            el('td',{style:{border:'1px solid #ccc',textAlign:'center',fontWeight:700,color:'#6B7A99'}},'SMERAV')
          )
        )
      )
    )
  );
}
